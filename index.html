<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartsheet Admin Documentation Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        
        .status.info {
            display: block;
            background: #e7f3ff;
            color: #0050b3;
            border-left: 3px solid #0050b3;
        }
        
        .status.loading {
            display: block;
            background: #fff7e6;
            color: #ad6800;
            border-left: 3px solid #ad6800;
        }
        
        .status.error {
            display: block;
            background: #fff1f0;
            color: #a4373a;
            border-left: 3px solid #a4373a;
        }
        
        .status.success {
            display: block;
            background: #f6ffed;
            color: #274916;
            border-left: 3px solid #274916;
        }
        
        .output-section {
            margin-top: 30px;
            display: none;
        }
        
        .output-section.active {
            display: block;
        }
        
        .documentation {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
        }
        
        .doc-section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        
        .doc-section:last-child {
            border-bottom: none;
        }
        
        .doc-title {
            font-size: 15px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .doc-content {
            color: #333;
        }
        
        .sheet-item {
            background: white;
            border-left: 3px solid #764ba2;
            padding: 12px;
            margin: 8px 0;
            border-radius: 3px;
        }
        
        .sheet-name {
            font-weight: 600;
            color: #764ba2;
            margin-bottom: 5px;
        }
        
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-secondary {
            background: #f0f2f5;
            color: #333;
            flex: 1;
        }
        
        .btn-secondary:hover {
            background: #e4e6eb;
            transform: translateY(-2px);
        }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Smartsheet Admin Documentation</h1>
            <p>Analyze sheets, formulas, automations, and workflows in your Smartsheet folder</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <div class="input-group">
                    <label for="apiKey">Anthropic API Key:</label>
                    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveApiKey()">
                </div>

                <div class="input-group">
                    <label for="folderUrl">Smartsheet Folder URL or ID:</label>
                    <input type="text" id="folderUrl" placeholder="https://app.smartsheet.com/folders/... or folder ID" value="grPh426FjV53GxWcrRcwf2J62jJG5CqC2cf853J1">
                </div>
                
                <div class="input-group">
                    <label for="documentationNotes">Additional Notes (optional):</label>
                    <textarea id="documentationNotes" placeholder="Add any specific focus areas, naming conventions, or other details for the documentation..."></textarea>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="generateBtn" onclick="generateDocumentation()">
                        <span id="btnText">Generate Documentation</span>
                    </button>
                </div>
                
                <div class="status" id="status"></div>
            </div>
            
            <div class="output-section" id="outputSection">
                <h2 style="margin-bottom: 15px; color: #333;">Generated Documentation</h2>
                <div class="documentation" id="documentation"></div>
                
                <div class="export-buttons">
                    <button class="btn-secondary" onclick="downloadAsMarkdown()">📥 Download as Markdown</button>
                    <button class="btn-secondary" onclick="downloadAsText()">📄 Download as Text</button>
                    <button class="btn-secondary" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let generatedDoc = '';

        // Persist API key in localStorage so user doesn't re-enter each session
        function saveApiKey() {
            const key = document.getElementById('apiKey').value;
            if (key) localStorage.setItem('anthropic_api_key', key);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('anthropic_api_key');
            if (saved) document.getElementById('apiKey').value = saved;
        });

        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function showLoading(loading) {
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = loading;
            btnText.innerHTML = loading ? '<span class="loader"></span>Generating...' : 'Generate Documentation';
        }

        async function generateDocumentation() {
            const folderUrl = document.getElementById('folderUrl').value.trim();
            const notes = document.getElementById('documentationNotes').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();

            if (!apiKey) {
                updateStatus('Please enter your Anthropic API key', 'error');
                return;
            }

            if (!folderUrl) {
                updateStatus('Please enter a Smartsheet folder URL or ID', 'error');
                return;
            }

            showLoading(true);
            updateStatus('Connecting to Smartsheet and analyzing folder...', 'loading');

            try {
                // Call Claude API with Smartsheet MCP
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": apiKey,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 4000,
                        messages: [
                            {
                                role: "user",
                                content: `You are a Smartsheet solution administrator. I need comprehensive documentation for a Smartsheet folder at ID: ${folderUrl}

Please use the Smartsheet MCP tools to:
1. Browse the folder contents to find all sheets
2. For each sheet, get detailed information including:
   - Sheet name and description
   - Column names and types
   - Any formulas used (especially summary formulas)
   - Sheet summary fields
   - Any visible automations or workflows
3. Compile this into professional admin documentation

${notes ? `Additional focus areas: ${notes}` : ''}

Format the documentation with clear sections for:
- Overview (folder contents summary)
- Each sheet's details (data structure, formulas, automations)
- Summary fields and metrics
- Key workflows and automations
- Best practices for managing these sheets
- Maintenance notes

Make it thorough and well-organized for administrators.`
                            }
                        ],
                        mcp_servers: [
                            {
                                "type": "url",
                                "url": "https://mcp.smartsheet.com",
                                "name": "smartsheet-mcp"
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API error: ${response.status}`);
                }

                const data = await response.json();
                
                // Extract text from response
                let documentation = '';
                if (data.content && Array.isArray(data.content)) {
                    for (const block of data.content) {
                        if (block.type === 'text') {
                            documentation += block.text;
                        }
                    }
                }

                if (!documentation) {
                    throw new Error('No documentation generated from API response');
                }

                generatedDoc = documentation;
                displayDocumentation(documentation);
                showLoading(false);
                updateStatus('Documentation generated successfully!', 'success');

            } catch (error) {
                console.error('Error:', error);
                showLoading(false);
                updateStatus(`Error: ${error.message}`, 'error');
            }
        }

        function displayDocumentation(doc) {
            const outputSection = document.getElementById('outputSection');
            const docElement = document.getElementById('documentation');
            
            // Format for display
            const formatted = doc
                .split('\n')
                .map(line => {
                    // Style headers
                    if (line.match(/^#+\s/)) {
                        const level = line.match(/^#+/)[0].length;
                        return `<div class="doc-title">${line.replace(/^#+\s/, '')}</div>`;
                    }
                    return line;
                })
                .join('\n');
            
            docElement.innerHTML = `<pre style="white-space: pre-wrap; word-wrap: break-word;">${escapeHtml(doc)}</pre>`;
            outputSection.classList.add('active');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function downloadAsMarkdown() {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/markdown;charset=utf-8,' + encodeURIComponent(generatedDoc));
            element.setAttribute('download', 'smartsheet_admin_documentation.md');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            updateStatus('Documentation downloaded as Markdown', 'success');
        }

        function downloadAsText() {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(generatedDoc));
            element.setAttribute('download', 'smartsheet_admin_documentation.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            updateStatus('Documentation downloaded as Text', 'success');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(generatedDoc).then(() => {
                updateStatus('Documentation copied to clipboard!', 'success');
            }).catch(err => {
                updateStatus('Failed to copy to clipboard', 'error');
            });
        }
    </script>
</body>
</html>
